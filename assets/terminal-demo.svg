<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <style>
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .btn-close { fill: #f38ba8; }
    .btn-min { fill: #f9e2af; }
    .btn-max { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; font-size: 13px; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .info { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .success { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .warn { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .error { fill: #f38ba8; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .white { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
  </style>

  <!-- Window frame -->
  <rect class="bg" width="800" height="320" rx="10" ry="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="800" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="20" width="800" height="16"/>

  <!-- Traffic lights -->
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text class="title" x="400" y="23" text-anchor="middle">Terminal — claudux drift</text>

  <!-- Terminal content -->
  <g transform="translate(20, 56)">
    <!-- context comment: the differentiator -->
    <text class="dim" y="0"># runs in CI. no API key, no network. pure lint.</text>

    <!-- command -->
    <text class="prompt" y="28">$</text>
    <text class="cmd" x="16" y="28">claudux drift</text>

    <!-- report header -->
    <text class="dim" y="56">claudux drift — sensitivity=surface, baseline=2d3fe19</text>

    <!-- the failure -->
    <text class="error" y="80">❌ Drift detected: 1 doc unit out of date. The code moved; the doc didn't.</text>

    <!-- specifics -->
    <text class="white" x="16" y="108">docs/guide/commands.md (page: guide.commands)</text>
    <text class="warn" x="31" y="126">documents lib/ui.sh, which changed.</text>
    <text class="dim" x="31" y="144">Update the doc, or run 'claudux drift --accept' to re-baseline.</text>

    <!-- the punchline: your build fails -->
    <text class="prompt" y="176">$</text>
    <text class="cmd" x="16" y="176">echo "exit $?"</text>
    <text class="error" y="194">exit 1</text>

    <!-- next prompt -->
    <text class="prompt" y="222">$</text>
    <text class="dim" x="16" y="222">▌</text>
  </g>
</svg>
