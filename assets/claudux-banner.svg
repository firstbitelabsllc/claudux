<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" fill="none">
  <style>
    :root {
      --bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-dim: #ede9fe;
      --node-bg: #ffffff;
      --node-border: #e2e8f0;
      --arrow: #cbd5e1;
      --green: #10b981;
      --green-dim: #d1fae5;
      --red: #ef4444;
      --red-dim: #fee2e2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #a78bfa;
        --accent-dim: #2e1065;
        --node-bg: #1e293b;
        --node-border: #334155;
        --arrow: #475569;
        --green: #34d399;
        --green-dim: #064e3b;
        --red: #f87171;
        --red-dim: #450a0a;
      }
    }
    .bg { fill: var(--bg); }
    .text-primary { fill: var(--text-primary); }
    .text-secondary { fill: var(--text-secondary); }
    .text-muted { fill: var(--text-muted); }
    .accent { fill: var(--accent); }
    .accent-dim { fill: var(--accent-dim); }
    .node-bg { fill: var(--node-bg); }
    .node-border { stroke: var(--node-border); fill: none; }
    .arrow-stroke { stroke: var(--arrow); fill: none; }
    .arrow-fill { fill: var(--arrow); }
    .accent-stroke { stroke: var(--accent); fill: none; }
    .green { fill: var(--green); }
    .green-dim { fill: var(--green-dim); }
    .green-stroke { stroke: var(--green); fill: none; }
    .red { fill: var(--red); }
    .red-dim { fill: var(--red-dim); }
    .red-stroke { stroke: var(--red); fill: none; }

    @keyframes flow {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: flow 1.5s linear infinite;
    }
  </style>

  <rect width="960" height="280" rx="12" class="bg"/>

  <g class="text-muted" opacity="0.2">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/>
    <circle cx="840" cy="240" r="1"/><circle cx="880" cy="240" r="1"/><circle cx="920" cy="240" r="1"/>
  </g>

  <text x="480" y="70" text-anchor="middle" class="text-primary" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-2">claudux</text>
  <text x="480" y="100" text-anchor="middle" class="text-secondary" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">Keep your docs true to your code.</text>

  <g transform="translate(175, 150)">
    <!-- input: your code -->
    <rect x="0" y="16" width="130" height="24" rx="7" class="node-bg"/>
    <rect x="0" y="16" width="130" height="24" rx="7" class="node-border" stroke-width="1.5"/>
    <text x="65" y="32" text-anchor="middle" class="text-primary" font-family="ui-monospace, monospace" font-size="12" font-weight="600">your code</text>

    <!-- into the generator -->
    <line x1="130" y1="28" x2="198" y2="28" class="arrow-stroke flow-line" stroke-width="1.5"/>
    <polygon points="195,23 205,28 195,33" class="arrow-fill"/>

    <!-- generation, kept on rails -->
    <rect x="207" y="2" width="176" height="52" rx="10" class="accent-dim"/>
    <rect x="207" y="2" width="176" height="52" rx="10" class="accent-stroke" stroke-width="1.5"/>
    <text x="295" y="24" text-anchor="middle" class="accent" font-family="ui-monospace, monospace" font-size="14" font-weight="700">claudux update</text>
    <text x="295" y="42" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" letter-spacing="0.5">scan · draft · bounded patches</text>

    <!-- to the result -->
    <line x1="383" y1="28" x2="428" y2="28" class="accent-stroke flow-line" stroke-width="1.5"/>
    <polygon points="425,23 435,28 425,33" class="accent"/>

    <!-- result: a docs site, structure and links guarded -->
    <rect x="440" y="0" width="200" height="24" rx="7" class="green-dim"/>
    <rect x="440" y="0" width="200" height="24" rx="7" class="green-stroke" stroke-width="1.5"/>
    <text x="540" y="16" text-anchor="middle" class="green" font-family="ui-monospace, monospace" font-size="12" font-weight="600">✓ VitePress docs site</text>

    <rect x="440" y="32" width="200" height="24" rx="7" class="accent-dim"/>
    <rect x="440" y="32" width="200" height="24" rx="7" class="accent-stroke" stroke-width="1.5"/>
    <text x="540" y="48" text-anchor="middle" class="accent" font-family="ui-monospace, monospace" font-size="10" font-weight="600">structure pinned · links checked</text>
  </g>

  <text x="480" y="258" text-anchor="middle" class="text-muted" font-family="system-ui, -apple-system, sans-serif" font-size="11">Scan your code. Draft a VitePress site. Keep it on rails.</text>
</svg>
